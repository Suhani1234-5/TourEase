<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="apple-mobile-web-app-title" content="TourEase" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tour-ease-joh5.vercel.app">
    <meta property="og:title" content="Tour Ease">
    <meta property="og:description" content="Your Smart, Safe & Personalized Travel Assistant — Powered by AI | Plan Smarter, travel better">
    <meta property="og:image" content="https://tour-ease-joh5.vercel.app/tour_ease_logo.png">
    
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tour-ease-joh5.vercel.app">
    <meta property="twitter-title" content="Tour Ease">
    <meta property="twitter:description" content="Your Smart, Safe & Personalized Travel Assistant — Powered by AI | Plan Smarter, travel better">
    <meta property="twitter:image" content="https://tour-ease-joh5.vercel.app/tour_ease_logo.png">

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />    

    <script>
      /**
       * Early language restore / reset.
       * Runs BEFORE Google Translate loads, so the correct cookie is in place
       * when translate_a/element.js initialises.
       *
       * - If the user previously chose a non-English language → set the
       *   googtrans cookie so GT restores that language automatically.
       * - Otherwise (English or nothing saved) → clear any stale cookies so
       *   GT does NOT auto-translate on load.
       */
      (function () {
        var storageKey = 'tourease_language';
        var savedLang = 'en';
        try {
          savedLang = localStorage.getItem(storageKey) || 'en';
        } catch (e) { /* localStorage unavailable */ }

        var hostname = location.hostname;

        if (savedLang && savedLang !== 'en') {
          // Restore non-English language: set the cookie GT reads on init.
          var value = '/en/' + savedLang;
          var maxAge = '; max-age=' + (60 * 60 * 24 * 365);
          document.cookie = 'googtrans=' + value + '; path=/' + maxAge;
          if (hostname.indexOf('.') !== -1) {
            document.cookie = 'googtrans=' + value + '; path=/' + maxAge + '; domain=.' + hostname;
          }
        } else {
          // English (or nothing) → clear any stale googtrans cookie.
          document.cookie = 'googtrans=; path=/; max-age=0';
          document.cookie = 'googtrans=; path=/; max-age=0; domain=' + hostname;
          document.cookie = 'googtrans=; path=/; max-age=0; domain=.' + hostname;
          try { localStorage.setItem(storageKey, 'en'); } catch (e) {}
        }

        document.documentElement.lang = savedLang !== 'en' ? savedLang : 'en';
      })();
    </script>
    
    <title>TourEase - Your Smart Travel Assistant</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" class="google-translate-host"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        globalThis.googleTranslateElement = new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            // All languages supported by the language selector
            includedLanguages: 'en,hi,kn,ta,te,ml,mr,bn,gu,pa,ur,fr,de,es,pt,it,ja,ko,zh-CN,ar,ru',
            autoDisplay: false,
          },
          'google_translate_element'
        );
      }
    </script>
    <!-- Google Translate script - integrity hash not applicable for dynamic resources -->
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
